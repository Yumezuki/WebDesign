        image:
          "https://scontent.fbkk7-3.fna.fbcdn.net/v/t39.30808-6/629238253_869092509296299_5277158883074597451_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=13d280&_nc_eui2=AeEhLEN4F23RasgBJ9xhcQ7BxjGCuH7TvKrGMYK4ftO8qg8o7-Z-2w6ovcTgFzqQbQzAwaWPT9kLUAyJv0naW7J0&_nc_ohc=8S5MsGS4448Q7kNvwHMcY6G&_nc_oc=AdmSAvKSFy_lkEX6EVRFLb47vr-3MZSqoQMFyF-t34kyMwvx3UTliG67GV5ndOvZkMQ&_nc_zt=23&_nc_ht=scontent.fbkk7-3.fna&_nc_gid=e73XhHpr-PmIGsLn5qazDQ&_nc_ss=8&oh=00_AfxekfqUxaq_cbOVltCLc-S_OtlDk3KU53ipCgtTX0NLJw&oe=69B1E155",

          "https://www.thaiticketmajor.com/cmsimg/imgeditor/Poster-LDM_ayano-600X840px.png",

    ];

    function showSongs() {
      songList.innerHTML = "";

      songs.forEach((song, index) => {
        songList.innerHTML += `
      <div onclick="goSong(${index})"
      class="cursor-pointer p-4 rounded-xl shadow h-36 md:h-60 w-52 md:w-auto justify-end text-white flex flex-col hover:scale-105 transition" 
      style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('${song.image}'); 
      background-size: cover; 
      background-position: center;">
        <h3 class="text-lg font-semibold">${song.name}</h3>
        <p class="text-sm text-gray-100">${song.artist}</p>
      </div>
    `;
      });
    }

    function showArtists() {
      songList.innerHTML = "";

      artists.forEach((artist, index) => {
        songList.innerHTML += `
      <div onclick="goArtist(${index})"
      class="cursor-pointer mb-4 p-4 rounded-xl shadow h-36 md:h-60 w-52 md:w-auto justify-end text-white flex flex-col hover:scale-105 transition" 
      style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('${artist.image}'); 
      background-size: cover; 
      background-position: center;">
        <h3 class="text-lg">${artist.name}</h3>
      </div>
    `;
      });
    }

    function showEvents() {
      songList.innerHTML = "";

      songList.innerHTML += `
      <button onclick="openEventPopup()" class="bg-[#E6DDD2] p-6 rounded-xl shadow h-36 md:h-60 w-52 md:w-auto flex flex-col items-center justify-center border-2 border-dashed border-[#3D2C25] cursor-pointer hover:bg-[#D9CFC4]">
        <p class="text-3xl text-[#3D2C25]">+</p>
        <p class="mt-2 text-sm text-gray-600">เพิ่ม Event</p>
      </button>
    `;

      events.forEach((event, index) => {
        songList.innerHTML += `
      <div onclick="goEvent(${index})"      
      class="cursor-pointer mb-4 p-4 rounded-xl shadow h-36 md:h-60 w-52 md:w-auto justify-end text-white flex flex-col relative hover:scale-105 transition"
      style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('${event.image}'); 
      background-size: cover; 
      background-position: center;">
        <h3 class="text-lg">${event.name}</h3>
        <div class="absolute top-3 left-3 text-center bg-sky-300 rounded-full px-4 py-2 text-black text-sm font-bold">
        ${event.day}
        <div class="text-xs">${event.month}</div>
      </div>
      </div>
    </a>
    `;
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        // เปลี่ยนสีปุ่ม
        buttons.forEach((btn) => {
          btn.classList.remove("bg-[#3D2C25]", "text-white");
          btn.classList.add("border");
        });

        button.classList.add("bg-[#3D2C25]", "text-white");
        button.classList.remove("border");

        const type = button.innerText;

        if (type === "เพลง") {
          showSongs();
        } else if (type === "ศิลปิน") {
          showArtists();
        } else if (type === "อีเว้นต์") {
          showEvents();
        }

        // เอาข้อความจากปุ่ม
        const searchType = button.innerText;

        // เปลี่ยนข้อความผลลัพธ์
        title.innerHTML = `${searchType}`;
      });
    });

    function goSong(index) {
      window.location.href = "song.html?id=" + index;
    }

    function goArtist(index) {
      window.location.href = "artist.html?id=" + index;
    }

    function goEvent(index) {
      window.location.href = "event.html?id=" + index;
    }

    showSongs();

    const popup = document.getElementById("eventPopup")

    function openEventPopup() {
      popup.classList.remove("hidden")
      popup.classList.add("flex")
    }

    function closeEventPopup() {
      popup.classList.add("hidden")
      popup.classList.remove("flex")
    }
  </script>

</body>
