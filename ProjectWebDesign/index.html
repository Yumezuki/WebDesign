<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodsic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://cdn-uicons.flaticon.com/3.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css" />
  <link rel="stylesheet"
    href="https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="sticky top-0 z-50 bg-[#E8DED3] flex justify-between items-center px-10 py-4">
    <a href="index.html" class="text-2xl font-semibold">Moodsic</a>

    <div class="space-x-10">
      <a href="index.html">หน้าแรก</a>
      <a href=" search.html">ค้นหา</a>
      <a href="myfav.html">MyFav</a>
    </div>

    <a href="profile.html" class="bg-[#3D2C25] text-white px-3 py-2 rounded-full flex items-center text-sm">
      <i class="fi fi-sr-user"></i>
    </a>
  </nav>

  <!-- Hero Section -->

  <section class="px-16 py-32 shadow text-white " style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url(https://i.pinimg.com/736x/e8/f7/84/e8f784b4fce835edf29f34de7057dd35.jpg); 
      background-size: cover; 
      background-position: center;">
    <div class="top-1/2 left-10 text-white">
      <h1 class="text-4xl font-bold mb-4">เลือกเพลงให้เข้ากับอารมณ์ของคุณ</h1>

      <p class="mb-4">
        ค้นหาเพลงตาม Mood ของคุณ ติดตามศิลปิน และดูอีเว้นต์ต่างๆ ของศิลปิน
      </p>

      <a href="#sec-mood" class="bg-[#8c6f63] px-6 py-2 rounded rounded-full text-white">
        เลือก Mood เลย
      </a>
    </div>
  </section>

  <!-- Mood Picker -->
  <section class="p-10 md:px-36">
    <h2 id="sec-mood" class="text-2xl font-bold mb-2">Mood Picker</h2>

    <p class="text-gray-600 mb-6">วันนี้อยากฟังเพลง Mood ไหน</p>

    <div class="grid grid-cols-4 gap-4">
      <button class="moodBtn bg-green-400 p-3 rounded rounded-full">
        Chill
      </button>
      <button class="moodBtn border p-3 rounded rounded-full">Sleepy</button>
      <button class="moodBtn border p-3 rounded rounded-full">Happy</button>
      <button class="moodBtn border p-3 rounded rounded-full">Focus</button>
      <button class="moodBtn border p-3 rounded rounded-full">
        Energetic
      </button>
      <button class="moodBtn border p-3 rounded rounded-full">Sad</button>
      <button class="moodBtn border p-3 rounded rounded-full">In Love</button>
      <button class="moodBtn border p-3 rounded rounded-full">Hype</button>
    </div>
  </section>

  <!-- เพลง -->
  <div class="max-w-6xl mx-auto p-10">
    <h2 id="result" class="text-2xl mb-10 font-bold">
      Your Mood is <span class="text-4xl text-green-500">Chill</span>
    </h2>
    <div id="songList" class="grid grid-cols-3 gap-6">
      <!-- CARD -->
    </div>
  </div>

  <footer class="bg-[#3e2f28] text-white text-center p-4">
    Made by Aunchista
  </footer>

  <script>
    const moodButtons = document.querySelectorAll(".moodBtn");
    const result = document.getElementById("result");
    const songList = document.getElementById("songList");

    const songs = [
      {
        name: "หนึ่งคนตรงนี้",
        artist: "PURPEECH",
        image:
          "https://i.ytimg.com/vi/HSUY57U2kJ4/hqdefault.jpg?sqp=-oaymwEnCNACELwBSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLBkNf1b7F8MPgFUhD2ekntXZCzwUA",
      },
      {
        name: "บังเอิญพบทานตะวัน",
        artist: "PURPEECH",
        image:
          "https://i.ytimg.com/vi/FMuIkvsIjL0/hqdefault.jpg?sqp=-oaymwEnCNACELwBSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLBy-E6TbEOwB5zfM2bLZRh0WlGKPQ",
      },
      {
        name: "ปลายฝนต้นหนาว",
        artist: "LANDOKMAI",
        image:
          "https://i.ytimg.com/vi/3EaB5urSaNk/hq720.jpg?sqp=-oaymwEnCNAFEJQDSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLDE3-25WUaXF4-yPPc1l_7CZtuhtg",
      },
      {
        name: "ห้องเล็ก",
        artist: "LANDOKMAI",
        image:
          "https://i.ytimg.com/vi/6urw5FzFt2Q/hqdefault.jpg?sqp=-oaymwEnCNACELwBSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLCHmXHRY4Hwug16ivS8O-OX1UhMVA",
      },
      {
        name: "กลัวความเสียใจ",
        artist: "SARAN ft.Pearpilincys",
        image:
          "https://i.ytimg.com/vi/nOIKmWe-KEc/hq720.jpg?sqp=-oaymwEnCNAFEJQDSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLBcXc9sg_aaJTsryWx06jrUC01gsg",
      },
      {
        name: "คนโปรด",
        artist: "Pearpilincys",
        image:
          "https://i.ytimg.com/vi/hO0R0YTqnow/hqdefault.jpg?sqp=-oaymwEnCNACELwBSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLBC5WqKcTGPo_I4M_nwWvjkC0rWCA",
      },
    ];

    function showSongs() {
      songList.innerHTML = "";

      songs.forEach((song, index) => {
        songList.innerHTML += `
      <div onclick="goSong(${index})"
      class="cursor-pointer p-4 rounded-xl shadow h-36 md:h-60 w-52 md:w-auto justify-end text-white flex flex-col hover:scale-105 transition" 
      style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('${song.image}'); 
      background-size: cover; 
      background-position: center;">
        <h3 class="text-lg font-semibold">${song.name}</h3>
        <p class="text-sm text-gray-100">${song.artist}</p>
      </div>
    `;
      });
    }

    moodButtons.forEach((button) => {
      button.addEventListener("click", () => {

        moodButtons.forEach((btn) => {
          btn.classList.remove("bg-green-400", "text-white");
          btn.classList.add("border");
        });

        button.classList.add("bg-green-400", "text-white");
        button.classList.remove("border");

        const mood = button.innerText;

        showSongs();

        result.innerHTML = `Your Mood is <span class="text-4xl text-green-500">${mood}</span>`;
      });
    });

    function goSong(index) {
      window.location.href = "song.html?id=" + index;
    }

    showSongs();

  </script>
</body>

</html>
