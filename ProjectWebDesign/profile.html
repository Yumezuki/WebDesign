<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodsic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://cdn-uicons.flaticon.com/3.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css" />
  <link rel="stylesheet"
    href="https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
</head>

<body class="bg-[#F3F3F3]">
  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 bg-[#E8DED3] flex justify-between items-center px-10 py-4">
    <a href="index.html" class="text-2xl font-semibold">Moodsic</a>

    <div class="space-x-10">
      <a href="index.html">หน้าแรก</a>
      <a href=" search.html">ค้นหา</a>
      <a href="myfav.html">MyFav</a>
    </div>

    <a href="profile.html" class="bg-[#3D2C25] text-white px-3 py-2 rounded-full flex items-center text-sm">
      <i class="fi fi-sr-user"></i>
    </a>
  </nav>

  <!-- PROFILE SECTION -->
  <div class="grid grid-cols-2">
    <button onclick="history.back()"
      class="absolute top-28 left-16 text-[#3D2C25] md:text-xl flex items-center gap-2 hover:scale-110 transition">
      ‹ กลับ
    </button>

    <!-- name -->
    <div class="flex items-end justify-center">
      <div class="flex items-center gap-4">
        <h1 class="text-5xl font-bold text-[#3D2C25]">PurPLanD</h1>

        <button class="mt-3 text-xl text-gray-500 hover:text-black"><i class="fi fi-rr-edit"></i></button>
      </div>
    </div>

    <!-- img -->
    <div>
      <img src="https://i.pinimg.com/736x/14/26/82/1426825c078bf5b5667049aa2dc21c3b.jpg"
        class="w-full h-[550px] object-cover" />
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-10 mt-10">
    <!-- status -->
    <div class="flex gap-8 mt-16 justify-center text-center">
      <div class="flex items-center gap-4">
        <div class="bg-[#E6DDD2] px-6 py-3 rounded-full">Fav songs</div><span class="text-2xl font-bold text-[#3D2C25]">0</span>
      </div>

      <div class="flex items-center gap-4">
        <div class="bg-[#E6DDD2] px-6 py-3 rounded-full">Fav artists</div>
        <span class="text-2xl font-bold text-[#3D2C25]">0</span>
      </div>

      <div class="flex items-center gap-4">
        <div class="bg-[#E6DDD2] px-6 py-3 rounded-full">Fav events</div>
        <span class="text-2xl font-bold text-[#3D2C25]">0</span>
      </div>

      <div class="flex items-center gap-4">
        <div class="bg-[#E6DDD2] px-6 py-3 rounded-full">Post events
        </div>
        <span class="text-2xl font-bold text-[#3D2C25]">0</span>
      </div>
    </div>

    <div class="flex justify-between">
      <!-- email -->
      <div class="flex items-center gap-6 mt-12">
        <div class="bg-[#E6DDD2] px-6 py-3 rounded-full">Gmail</div>

        <p class="text-xl font-semibold text-[#3D2C25]">PurPLanD@gmail.com</p>
      </div>

      <!-- logout -->
      <div class="flex justify-end mt-12">
        <a href="login.html" class="bg-[#E06666] text-white px-10 py-4 rounded-full text-lg">
          ออกจากระบบ
        </a>
      </div>
    </div>
  </div>

  <!-- footer -->
  <footer class="bg-[#3D2C25] text-white text-center py-4 mt-16">
    Made by Aunchista
  </footer>
</body>

</html>
